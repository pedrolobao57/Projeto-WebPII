  <!-- Map Pin Icon -->
  <path d="M256,70 C160,70 100,130 100,226 C100,322 256,430 256,430 C256,430 412,322 412,226 C412,130 352,70 256,70 Z" fill="url(#pinGrad)" />
  <!-- Inner Circle -->
  <circle cx="256" cy="210" r="90" fill="#0f172a" />
  <!-- Letter P -->
  <text x="252" y="248" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="115" fill="#ffffff" text-anchor="middle">P</text>
